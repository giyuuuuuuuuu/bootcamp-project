<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TaskFlow</title>
</head>
<body>
    <header>
        <h1>TaskFlow</h1>
    </header>

    <div class="main-container"> 
        
        <aside>
            <h2>Estadísticas</h2>
            <p>Total: <span id="total-tasks">0</span></p>
            <p>Completadas: <span id="completed-tasks">0</span></p>
            <p>Pendientes: <span id="pending-tasks">0</span></p>
        </aside>

        <main>
            <section id="add-task">
                <h2>Nueva Tarea</h2>
                <form id="todo-form">
                    <label for="task-input">¿Qué tienes pendiente?</label>
                    <input type="text" id="task-input" placeholder="Escriba una tarea" novalidate>
                    <button type="submit">Añadir</button>
                </form>
            </section>
            <section id="task-list-section">
                <h2>Mis Tareas</h2>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">Todas</button>
                    <button class="filter-btn" data-filter="completed">Completadas</button>
                    <button class="filter-btn" data-filter="pending">Pendientes</button>
                </div>
                <ul id="task-list"></ul>
                
                <template id="task-template">
                    <li class="task-item">
                        <div class="flex items-center">
                            <input type="checkbox" class="task-checkbox mr-2">
                            <span class="task-text"></span> 
                        </div>
                        <button type="button" class="delete-btn text-red-500">Eliminar</button>
                    </li>
                </template>
            </section>
        </main>

    </div> 
    <footer>
        <p>TaskFlow Project</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
